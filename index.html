<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex Explorer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <nav>
      <span class="nav__logo">Pokédex Explorer</span>
      <div class="nav__links">
        <a href="index.html" class="active">Search</a>
        <a href="saved.html">Saved</a>
      </div>
      <div class="nav__actions">
        <span id="nav-user"></span>
        <button id="logout-btn" type="button">Logout</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1 class="hero__title">Find your Pokémon</h1>
      <p class="hero__sub">Search by name or type, and save your favorites.</p>
    </section>

    <!-- search / filter form -->
    <section>
      <div class="search-card">
        <form id="search-form">

          <div class="form__group">
            <label for="name-input">Pokémon Name</label>
            <input id="name-input" type="text" name="name" placeholder="pikachu..." aria-label="Search by pokemon name">
          </div>

          <div class="form__group">
            <label for="type-select">Type</label>
            <select id="type-select" name="type" aria-label="Filter by pokemon type">
              <option value="">All</option>
              <option value="fire">Fire</option>
              <option value="water">Water</option>
              <option value="grass">Grass</option>
              <option value="electric">Electric</option>
              <option value="psychic">Psychic</option>
              <option value="ice">Ice</option>
              <option value="dragon">Dragon</option>
              <option value="dark">Dark</option>
              <option value="fairy">Fairy</option>
              <option value="fighting">Fighting</option>
              <option value="rock">Rock</option>
              <option value="ghost">Ghost</option>
              <option value="bug">Bug</option>
              <option value="poison">Poison</option>
              <option value="ground">Ground</option>
              <option value="flying">Flying</option>
              <option value="steel">Steel</option>
              <option value="normal">Normal</option>
            </select>
          </div>

          <div class="form__group">
            <label for="limit-input">Results: <span id="limit-value">12</span></label>
            <input id="limit-input" type="range" name="limit" min="4" max="20" value="12" step="4">
          </div>

          <button type="submit" class="search-btn">Search</button>
        </form>
      </div>
    </section>

    <!-- loading and error states -->
    <p id="loading-msg" hidden>Loading...</p>
    <p id="error-msg" hidden></p>

    <div class="results-meta">
      <span id="results-count"></span>
    </div>

    <!-- dynamically generated cards land here -->
    <section>
      <div id="results-grid"></div>
    </section>

  </main>

  <footer>
    <p>Web Engineering 2026 Final Project</p>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
