<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Pokédex Explorer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <main>
    <div class="login-card">
      <h1>Pokédex Explorer</h1>
      <p id="auth-subtitle">Login to your account</p>

      <div class="auth-tabs">
        <button id="tab-login" class="active">Login</button>
        <button id="tab-register">Sign Up</button>
      </div>

      <form id="login-form">
        <label for="login-name">Your name</label>
        <input id="login-name" type="text" name="name" required minlength="2">

        <label for="login-password">Password</label>
        <input id="login-password" type="password" name="password" required minlength="4">

        <p id="login-error" class="error-msg" hidden></p>
        <button type="submit" class="auth-btn">Login</button>
      </form>

      <form id="register-form" hidden>
        <label for="reg-name">Choose a name</label>
        <input id="reg-name" type="text" name="name" required minlength="2">

        <label for="reg-password">Choose a password</label>
        <input id="reg-password" type="password" name="password" required minlength="4">

        <p id="reg-error" class="error-msg" hidden></p>
        <button type="submit" class="auth-btn">Create Account</button>
      </form>
    </div>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
